<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Migración de Datos - Sistema Escolar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1f2e; color: #fff; padding: 40px; }
        h1 { margin-bottom: 20px; }
        .status { background: #2a2f3e; border-radius: 8px; padding: 20px; margin: 10px 0; }
        .status.ok { border-left: 4px solid #4ade80; }
        .status.error { border-left: 4px solid #f87171; }
        .status.pending { border-left: 4px solid #fbbf24; }
        .status.running { border-left: 4px solid #60a5fa; }
        #log { background: #0d1117; border-radius: 8px; padding: 20px; margin-top: 20px; max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.6; }
        button { background: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 5px 10px 0; }
        button:hover { background: #4338ca; }
        button:disabled { background: #555; cursor: not-allowed; }
        .counter { font-size: 24px; font-weight: bold; color: #4ade80; }
    </style>
</head>
<body>
    <h1>Migración de Datos a Firebase</h1>
    <p>Este script migra todos los datos del sistema anterior a Firestore.</p>

    <div style="margin: 20px 0;">
        <button id="btnMigrate" onclick="startMigration()">Iniciar Migración Completa</button>
        <button id="btnCheck" onclick="checkData()">Verificar Datos Existentes</button>
    </div>

    <div id="statusArea"></div>
    <div id="log"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyDX4za0avN20Lplmf5LAR7pdfZlvNtvcJc",
        authDomain: "epo67-sistema.firebaseapp.com",
        projectId: "epo67-sistema",
        storageBucket: "epo67-sistema.firebasestorage.app",
        messagingSenderId: "425082037377",
        appId: "1:425082037377:web:4bd72a502c874acfa25980"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function log(msg, type = 'info') {
        const el = document.getElementById('log');
        const colors = { info: '#60a5fa', success: '#4ade80', error: '#f87171', warn: '#fbbf24' };
        el.innerHTML += `<div style="color:${colors[type] || '#fff'}">${new Date().toLocaleTimeString()} | ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    function setStatus(id, text, type) {
        let el = document.getElementById('status-' + id);
        if (!el) {
            el = document.createElement('div');
            el.id = 'status-' + id;
            document.getElementById('statusArea').appendChild(el);
        }
        el.className = 'status ' + type;
        el.innerHTML = text;
    }

    // ============================================================
    // ALL DATA FROM PREVIOUS SYSTEM
    // ============================================================
    const MIGRATION_DATA = {
        meta: {
            escuela: "ESCUELA PREPARATORIA OFICIAL NÚM. 67",
            ciclo: "2025-2026",
            semestre: "SEGUNDO SEMESTRE",
            turnos: ["MATUTINO", "VESPERTINO"],
            grados: [1, 2, 3],
            grupos_matutino: ["1-1","1-2","1-3","2-1","2-2","2-3","3-1","3-2","3-3"],
            grupos_vespertino: ["1-1","1-2","1-3","2-1","2-2","2-3","3-1","3-2","3-3"],
            parciales: [1, 2, 3],
            metas: { promedio_minimo: 8.3, asistencia_minima: 80, reprobacion_maxima: 14 }
        },
        orientadores: {
            MATUTINO: {
                '1-1': 'PROFR. JOSE EDGAR SALAZAR',
                '1-2': 'PROFR. JOSE EDGAR SALAZAR',
                '1-3': 'PROFRA. ANA ISABEL CORREA SALGADO',
                '2-1': 'PROFRA. ANA ISABEL CORREA SALGADO',
                '2-2': 'PROFRA. ANA ISABEL CORREA SALGADO',
                '2-3': 'PROFRA. JUANA RANGEL PALACIOS',
                '3-1': 'PROFRA. NEFTALI MARGARITA MORLAN ORTIZ',
                '3-2': 'PROFRA. JUANA RANGEL PALACIOS',
                '3-3': 'PROFRA. JUANA RANGEL PALACIOS'
            },
            VESPERTINO: {
                '1-1': 'PROFRA. LAURITA MARTINEZ',
                '1-2': 'PROFRA. LAURITA MARTINEZ',
                '1-3': 'PROFRA. IVONNE GABRIELA CEDILLO POLO',
                '2-1': 'PROFRA. FERNANDA CITLALLI RODRIGUEZ VIVAS',
                '2-2': 'PROFRA. BEATRIZ ALEJANDRA GARCIA GONZALEZ',
                '2-3': 'PROFRA. BEATRIZ ALEJANDRA GARCIA GONZALEZ',
                '3-1': 'PROFRA. IVONNE GABRIELA CEDILLO POLO',
                '3-2': 'PROFRA. FERNANDA CITLALLI RODRIGUEZ VIVAS',
                '3-3': 'PROFRA. IVONNE GABRIELA CEDILLO POLO'
            }
        },
        subjects_by_grade: null, // Will be loaded from APP_DATA
        teachers: null,          // Will be loaded from APP_DATA
        students: null,          // Will be loaded from APP_DATA
        teacher_links: null      // Will be loaded from APP_DATA
    };

    // Load the full APP_DATA inline - fetched from the source file
    let APP_DATA = null;

    async function loadAppData() {
        log('Cargando APP_DATA desde el archivo fuente...');
        try {
            const response = await fetch('/app_data.json');
            APP_DATA = await response.json();
            log(`APP_DATA cargado: ${APP_DATA.students.length} alumnos, ${APP_DATA.teachers.length} asignaciones, ${Object.keys(APP_DATA.teacher_links).length} docentes`, 'success');
            return true;
        } catch (e) {
            log('Error cargando APP_DATA: ' + e.message, 'error');
            log('Asegurate de que app_data.json existe en la carpeta public/', 'warn');
            return false;
        }
    }

    // ============================================================
    // MIGRATION FUNCTIONS
    // ============================================================

    async function migrateSchoolConfig() {
        setStatus('config', 'Configuracion de escuela... migrando', 'running');
        log('--- Migrando configuracion de escuela ---');

        const config = {
            nombre: MIGRATION_DATA.meta.escuela,
            nombreCorto: 'EPO 67',
            cicloEscolar: MIGRATION_DATA.meta.ciclo,
            semestre: MIGRATION_DATA.meta.semestre,
            turnos: MIGRATION_DATA.meta.turnos,
            grados: MIGRATION_DATA.meta.grados,
            gruposMatutino: MIGRATION_DATA.meta.grupos_matutino,
            gruposVespertino: MIGRATION_DATA.meta.grupos_vespertino,
            parciales: MIGRATION_DATA.meta.parciales,
            metas: MIGRATION_DATA.meta.metas,
            orientadores: MIGRATION_DATA.orientadores,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection('config').doc('school').set(config);
        log('Configuracion de escuela guardada', 'success');
        setStatus('config', 'Configuracion de escuela OK', 'ok');
    }

    async function migrateGroups() {
        setStatus('groups', 'Grupos... migrando', 'running');
        log('--- Migrando grupos ---');
        let count = 0;

        const batch1 = db.batch();
        for (const turno of MIGRATION_DATA.meta.turnos) {
            const grupos = turno === 'MATUTINO' ? MIGRATION_DATA.meta.grupos_matutino : MIGRATION_DATA.meta.grupos_vespertino;
            for (const grupo of grupos) {
                const parts = grupo.split('-');
                const grado = parseInt(parts[0]);
                const letra = parts[1];
                const docId = `${turno}_${grupo}`;

                const orientador = MIGRATION_DATA.orientadores[turno] ? MIGRATION_DATA.orientadores[turno][grupo] || '' : '';

                batch1.set(db.collection('groups').doc(docId), {
                    nombre: grupo,
                    grado: grado,
                    letra: letra,
                    turno: turno,
                    orientador: orientador,
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                count++;
            }
        }
        await batch1.commit();
        log(`${count} grupos creados`, 'success');
        setStatus('groups', `Grupos: ${count} migrados`, 'ok');
        return count;
    }

    async function migrateSubjects() {
        setStatus('subjects', 'Materias... migrando', 'running');
        log('--- Migrando materias ---');
        let count = 0;
        const batch = db.batch();

        for (const [grade, subjects] of Object.entries(APP_DATA.subjects_by_grade)) {
            for (const subjectName of subjects) {
                const docId = `G${grade}_${subjectName.replace(/[\/\s]+/g, '_').substring(0, 40)}`;
                batch.set(db.collection('subjects').doc(docId), {
                    nombre: subjectName,
                    grado: parseInt(grade),
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                count++;
            }
        }
        await batch.commit();
        log(`${count} materias creadas`, 'success');
        setStatus('subjects', `Materias: ${count} migradas`, 'ok');
        return count;
    }

    async function migrateTeachers() {
        setStatus('teachers', 'Docentes... migrando', 'running');
        log('--- Migrando docentes ---');

        // Extract unique teachers from assignments
        const uniqueTeachers = new Map();
        for (const t of APP_DATA.teachers) {
            const name = t.docente;
            if (!uniqueTeachers.has(name)) {
                const link = APP_DATA.teacher_links[name] || {};
                uniqueTeachers.set(name, {
                    nombre: name,
                    turno: t.turno,
                    spreadsheetUrl: link.url || '',
                    spreadsheetId: link.spreadsheet_id || '',
                    status: 'active'
                });
            } else {
                // If teacher appears in both shifts, note it
                const existing = uniqueTeachers.get(name);
                if (existing.turno !== t.turno) {
                    existing.turno = 'AMBOS';
                }
            }
        }

        let count = 0;
        const teacherIdMap = {};

        // Use batches of 500 (Firestore limit)
        let batch = db.batch();
        let batchCount = 0;

        for (const [name, data] of uniqueTeachers) {
            const docRef = db.collection('teachers').doc();
            const teacherId = docRef.id;
            teacherIdMap[name] = teacherId;

            batch.set(docRef, {
                ...data,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            count++;
            batchCount++;

            if (batchCount >= 450) {
                await batch.commit();
                batch = db.batch();
                batchCount = 0;
                log(`  Batch de docentes guardado (${count} hasta ahora)...`);
            }
        }
        if (batchCount > 0) await batch.commit();

        log(`${count} docentes creados`, 'success');
        setStatus('teachers', `Docentes: ${count} migrados`, 'ok');
        return teacherIdMap;
    }

    async function migrateAssignments(teacherIdMap) {
        setStatus('assignments', 'Asignaciones... migrando', 'running');
        log('--- Migrando asignaciones docente-materia-grupo ---');

        // Get subject docs for ID mapping
        const subjectsSnap = await db.collection('subjects').get();
        const subjectIdMap = {};
        subjectsSnap.forEach(doc => {
            const d = doc.data();
            const key = `${d.grado}_${d.nombre}`;
            subjectIdMap[key] = doc.id;
        });

        let count = 0;
        let batch = db.batch();
        let batchCount = 0;
        const processedAssignments = new Set();
        const assignmentsByGroupSet = new Set();

        for (const t of APP_DATA.teachers) {
            const teacherId = teacherIdMap[t.docente];
            if (!teacherId) continue;

            const grupo = t.grupo;
            const turno = t.turno;
            const grado = parseInt(grupo.split('-')[0]);
            const groupDocId = `${turno}_${grupo}`;

            // Find subject ID
            const subjectKey = `${grado}_${t.materia}`;
            const subjectId = subjectIdMap[subjectKey];
            if (!subjectId) {
                log(`  Materia no encontrada: ${t.materia} (grado ${grado})`, 'warn');
                continue;
            }

            const assignKey = `${teacherId}_${groupDocId}_${subjectId}`;
            if (processedAssignments.has(assignKey)) continue;
            processedAssignments.add(assignKey);

            // Create assignment
            batch.set(db.collection('assignments').doc(assignKey), {
                teacherId: teacherId,
                teacherName: t.docente,
                groupId: groupDocId,
                groupName: grupo,
                turno: turno,
                subjectId: subjectId,
                subjectName: t.materia,
                grado: grado,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            count++;
            batchCount++;

            // Create assignmentsByGroup doc for security rules
            const abgKey = `${groupDocId}_${teacherId}`;
            if (!assignmentsByGroupSet.has(abgKey)) {
                assignmentsByGroupSet.add(abgKey);
                batch.set(db.collection('assignmentsByGroup').doc(abgKey), {
                    groupId: groupDocId,
                    teacherId: teacherId,
                    teacherName: t.docente
                });
                batchCount++;
            }

            if (batchCount >= 450) {
                await batch.commit();
                batch = db.batch();
                batchCount = 0;
                log(`  Batch de asignaciones guardado (${count} hasta ahora)...`);
            }
        }
        if (batchCount > 0) await batch.commit();

        log(`${count} asignaciones creadas + ${assignmentsByGroupSet.size} indices de grupo`, 'success');
        setStatus('assignments', `Asignaciones: ${count} migradas`, 'ok');
        return count;
    }

    async function migrateStudents() {
        setStatus('students', 'Alumnos... migrando', 'running');
        log('--- Migrando alumnos ---');

        let count = 0;
        let batch = db.batch();
        let batchCount = 0;

        for (const s of APP_DATA.students) {
            const groupDocId = `${s.turno}_${s.grupo}`;

            const docRef = db.collection('students').doc();
            batch.set(docRef, {
                np: s.np || 0,
                expediente: s.expediente || '',
                folio: s.folio || '',
                apellido1: s.apellido1 || '',
                apellido2: s.apellido2 || '',
                nombres: s.nombres || '',
                nombreCompleto: s.nombre_completo || `${s.apellido1} ${s.apellido2} ${s.nombres}`,
                grupo: s.grupo,
                groupId: groupDocId,
                grado: s.grado,
                turno: s.turno,
                sexo: s.sexo || '',
                estatus: s.estatus || 'ACTIVO',
                curp: s.curp || '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            count++;
            batchCount++;

            if (batchCount >= 450) {
                await batch.commit();
                batch = db.batch();
                batchCount = 0;
                log(`  Batch de alumnos guardado (${count} de ${APP_DATA.students.length})...`);
            }
        }
        if (batchCount > 0) await batch.commit();

        log(`${count} alumnos migrados`, 'success');
        setStatus('students', `Alumnos: ${count} migrados`, 'ok');
        return count;
    }

    async function migratePartials() {
        setStatus('partials', 'Parciales... migrando', 'running');
        log('--- Configurando parciales ---');

        const batch = db.batch();
        for (const p of MIGRATION_DATA.meta.parciales) {
            batch.set(db.collection('partials').doc(`P${p}`), {
                nombre: `Parcial ${p}`,
                numero: p,
                locked: false,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        await batch.commit();
        log('3 parciales configurados (todos abiertos)', 'success');
        setStatus('partials', 'Parciales: 3 configurados', 'ok');
    }

    // ============================================================
    // MAIN MIGRATION
    // ============================================================
    async function startMigration() {
        const btn = document.getElementById('btnMigrate');
        btn.disabled = true;
        document.getElementById('log').innerHTML = '';
        document.getElementById('statusArea').innerHTML = '';

        // Check auth
        const user = auth.currentUser;
        if (!user) {
            log('No hay sesion activa. Inicia sesion primero en el sistema principal.', 'error');
            log('Abriendo login con Google...', 'info');
            try {
                await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                log('Sesion iniciada: ' + auth.currentUser.email, 'success');
            } catch (e) {
                log('Error en login: ' + e.message, 'error');
                btn.disabled = false;
                return;
            }
        } else {
            log('Sesion activa: ' + user.email, 'success');
        }

        // Load APP_DATA
        const dataLoaded = await loadAppData();
        if (!dataLoaded) {
            btn.disabled = false;
            return;
        }

        const startTime = Date.now();
        log('========================================', 'info');
        log('INICIANDO MIGRACION COMPLETA', 'info');
        log('========================================', 'info');

        try {
            await migrateSchoolConfig();
            await migrateGroups();
            await migrateSubjects();
            const teacherIdMap = await migrateTeachers();
            await migrateAssignments(teacherIdMap);
            await migrateStudents();
            await migratePartials();

            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            log('========================================', 'success');
            log(`MIGRACION COMPLETADA en ${elapsed} segundos`, 'success');
            log('========================================', 'success');

            setStatus('done', `<span class="counter">MIGRACION EXITOSA</span><br>Tiempo: ${elapsed}s`, 'ok');
        } catch (error) {
            log('ERROR EN MIGRACION: ' + error.message, 'error');
            log(error.stack, 'error');
            setStatus('done', 'ERROR en la migracion - ver log', 'error');
        }

        btn.disabled = false;
    }

    async function checkData() {
        const user = auth.currentUser;
        if (!user) {
            await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        const collections = ['config', 'groups', 'subjects', 'teachers', 'assignments', 'students', 'partials', 'users'];
        document.getElementById('log').innerHTML = '';
        log('=== Verificando datos existentes ===');

        for (const col of collections) {
            try {
                const snap = await db.collection(col).limit(1).get();
                const countSnap = await db.collection(col).get();
                log(`${col}: ${countSnap.size} documentos`, countSnap.size > 0 ? 'success' : 'warn');
            } catch (e) {
                log(`${col}: Error - ${e.message}`, 'error');
            }
        }
    }

    // Auto-check auth state
    auth.onAuthStateChanged(user => {
        if (user) {
            log('Conectado como: ' + user.email, 'success');
        }
    });
    </script>
</body>
</html>

<style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:28px;color:#172033;line-height:1.45}button{padding:12px 16px;border:0;border-radius:6px;background:#2563eb;color:white;font-weight:800;cursor:pointer;margin:4px 8px 4px 0}.danger{background:#dc2626}.ok{background:#16a34a}pre{white-space:pre-wrap;background:#0f172a;color:#d1fae5;padding:16px;border-radius:8px;min-height:300px;max-height:60vh;overflow:auto}code{font-size:24px;font-weight:900;background:#f1f5f9;padding:8px 12px;border-radius:8px;display:inline-block}</style></head>
<body>
<h1>Publicar reglas Firestore</h1>
<p>Publica las reglas corregidas en <strong>epo67-sistema</strong>. No toca datos ni calificaciones.</p>
<button id="device">1. Pedir código Google</button>
<button id="poll" disabled>2. Ya autoricé, obtener token</button>
<button id="deploy" class="danger" disabled>3. Publicar reglas</button>
<pre id="log">Esperando...</pre>
<script>
const CLIENT_ID='32555940559.apps.googleusercontent.com';
const PROJECT='epo67-sistema';
const RULES="rules_version = '2';\n\n// ════════════════════════════════════════════════════════════════════════\n// PROPUESTA v5.9-security — NO DESPLEGAR SIN PROBAR EN EMULATOR PRIMERO\n//\n// Cambios respecto a firestore.rules activo:\n//   C-1: bootstrap de users fuerza role='consulta'\n//   C-2: grades valida que el maestro tenga assignment del grupo+materia\n//   A-1: attendance valida assignment del maestro con el grupo\n//   A-2: gradeCorrections requiere campos mínimos (studentId, subjectId, newGrade)\n//   A-3: emailAlerts restringe create a admin/orientador/directivo\n//   M-1: isDirectivo() helper agregado\n//   M-2: activityLog valida que userId = request.auth.uid\n//\n// Probar con:\n//   npx firebase-tools emulators:start --only firestore\n//\n// Desplegar sólo cuando TODAS las pruebas pasen y el usuario lo apruebe:\n//   cp firestore.rules.proposed firestore.rules\n//   npx firebase-tools deploy --only firestore:rules\n// ════════════════════════════════════════════════════════════════════════\n\nservice cloud.firestore {\n  match /databases/{database}/documents {\n\n    // ─── FUNCIONES AUXILIARES ───────────────────────────\n    function isAuthenticated() {\n      return request.auth != null;\n    }\n\n    function getUserData() {\n      return get(/databases/$(database)/documents/users/$(request.auth.uid)).data;\n    }\n\n    function isAdmin()             { return isAuthenticated() && getUserData().role == 'admin'; }\n    function isOrientador()        { return isAuthenticated() && getUserData().role == 'orientador'; }\n    function isMaestro()           { return isAuthenticated() && getUserData().role == 'maestro'; }\n    function isDirectivo()         { return isAuthenticated() && getUserData().role == 'directivo'; }\n    function isSubdirector()       { return isAuthenticated() && getUserData().role == 'subdirector'; }\n    function isSecretarioEscolar() { return isAuthenticated() && getUserData().role == 'secretario_escolar'; }\n    function isSecretarioAdmin()   { return isAuthenticated() && getUserData().role == 'secretario_admin'; }\n    function isOrientadorDocente() { return isAuthenticated() && getUserData().role == 'orientador_docente'; }\n    function isPresidenteAcademia(){ return isAuthenticated() && getUserData().role == 'presidente_academia'; }\n\n    // Subdirector = casi-admin. Puede escribir en TODO menos:\n    //   - users (admin-only — proteccion de identidad)\n    //   - grades (solo admin o maestro-con-asignacion — captura es responsabilidad del docente)\n    //   - activityLog (read-only)\n    function isAdminOrSubdirector() { return isAdmin() || isSubdirector(); }\n\n    // Auditor (rol ADITIVO): flag users.auditorScope=true otorga lectura\n    // global de students/grades/assignments para auditar el sistema completo\n    // (ambos turnos, todos los grados). NO concede permisos de escritura ni\n    // de generar boletas. Admin/subdirector/directivo ya son auditores\n    // implícitos. Diseñado para Jessica Alcántara (mayo 2026) — supervisora\n    // que sigue siendo docente en sus 4 materias pero monitorea todo.\n    function isAuditor() {\n      return isAuthenticated() &&\n        (getUserData().auditorScope == true ||\n         getUserData().role == 'admin' ||\n         getUserData().role == 'subdirector' ||\n         getUserData().role == 'directivo');\n    }\n\n    // Secretario Escolar y Secretaria Administrativa: misma vista que directivo\n    // pero con escrituras puntuales (escolar→inscripciones, admin→datos escuela).\n    function canReadAsDirectivo() { return isDirectivo() || isSecretarioEscolar() || isSecretarioAdmin(); }\n    function canManageEnrollment() { return isAdmin() || isSubdirector() || isSecretarioEscolar(); }\n    // Datos de la escuela: SOLO admin (Olivia) y secretario_admin (Lupita).\n    // Subdirector/directivo/etc NO pueden modificarlos.\n    function canManageSchoolConfig() { return isAdmin() || isSecretarioAdmin(); }\n\n    // Helpers efectivos: combinan roles puros con los híbridos.\n    // - orientador_docente hereda permisos de orientador y maestro.\n    // - presidente_academia también es maestro (imparte clases) además de\n    //   tener acceso a estadísticas de su academia.\n    function canMaestro()    { return isMaestro() || isOrientadorDocente() || isPresidenteAcademia(); }\n    function canOrientador() { return isOrientador() || isOrientadorDocente(); }\n\n    function getTeacherId() {\n      return getUserData().teacherId;\n    }\n\n    function teacherHasGroup(groupId) {\n      return canMaestro() &&\n        exists(/databases/$(database)/documents/assignmentsByGroup/$(groupId + '_' + getTeacherId()));\n    }\n\n    // Presidente/Secretario de Academia (rol ADITIVO — NO está en users.role):\n    // permite leer alumnos/grades/etc. de los grupos de SU grado+turno aunque\n    // no tenga asignación docente en ellos. Triggered cuando el user doc tiene\n    // academiaGrado + academiaTurno y el grupo coincide con ambos.\n    // Sembrado por: scripts/fixes/asignar-presidentes-academia.js\n    function isAcademiaScopeOf(groupId) {\n      return isAuthenticated() &&\n        getUserData().academiaGrado != null &&\n        getUserData().academiaTurno != null &&\n        get(/databases/$(database)/documents/groups/$(groupId)).data.grado == getUserData().academiaGrado &&\n        get(/databases/$(database)/documents/groups/$(groupId)).data.turno == getUserData().academiaTurno;\n    }\n\n    // Para calificaciones: valida asignación triple (teacher + group + subject)\n    function teacherHasAssignment(groupId, subjectId) {\n      return canMaestro() &&\n        exists(/databases/$(database)/documents/assignments/$(getTeacherId() + '_' + groupId + '_' + subjectId));\n    }\n\n    function isPartialLocked(partial) {\n      return get(/databases/$(database)/documents/partials/$(partial)).data.locked == true;\n    }\n\n    // v8.07: ¿el parcial está cerrado PARA UN GRADO específico?\n    // El partial doc tiene lockedByGrade: { '1': bool, '2': bool, '3': bool }.\n    // Si la entrada del grado existe, manda. Si no, fallback al campo locked global.\n    //\n    // Acepta grado como number o string — convierte con string().\n    //\n    // (cond1 con info por grado)  ||  (cond2 fallback global cuando no hay info)\n    function isPartialLockedForGrade(partial, grado) {\n      return (\n        // Caso 1: hay info por grado → manda esa\n        get(/databases/$(database)/documents/partials/$(partial)).data.lockedByGrade is map &&\n        string(grado) in get(/databases/$(database)/documents/partials/$(partial)).data.lockedByGrade &&\n        get(/databases/$(database)/documents/partials/$(partial)).data.lockedByGrade[string(grado)] == true\n      ) || (\n        // Caso 2: NO hay info por grado para ese grado → fallback al global\n        (\n          !(get(/databases/$(database)/documents/partials/$(partial)).data.lockedByGrade is map) ||\n          !(string(grado) in get(/databases/$(database)/documents/partials/$(partial)).data.lockedByGrade)\n        )\n        && get(/databases/$(database)/documents/partials/$(partial)).data.locked == true\n      );\n    }\n\n    // v8.07: ¿la ventana de correcciones está abierta AHORA?\n    function isCorrectionsWindowOpen() {\n      return exists(/databases/$(database)/documents/config/correctionsWindow) &&\n        get(/databases/$(database)/documents/config/correctionsWindow).data.open == true &&\n        (\n          get(/databases/$(database)/documents/config/correctionsWindow).data.closesAt == null ||\n          get(/databases/$(database)/documents/config/correctionsWindow).data.closesAt > request.time\n        );\n    }\n\n    // ¿El maestro tiene un OVERRIDE activo para escribir en este parcial\n    // aunque esté cerrado? El docId es determinístico: `${partial}_${teacherId}`\n    // para que la regla pueda hacer exists()/get() sin queries.\n    // Override válido si existe Y (no tiene expiresAt o expiresAt > ahora).\n    function teacherHasPartialOverride(partial) {\n      return canMaestro() &&\n        exists(/databases/$(database)/documents/partialOverrides/$(partial + '_' + getTeacherId())) &&\n        (\n          get(/databases/$(database)/documents/partialOverrides/$(partial + '_' + getTeacherId())).data.expiresAt == null ||\n          get(/databases/$(database)/documents/partialOverrides/$(partial + '_' + getTeacherId())).data.expiresAt > request.time\n        );\n    }\n\n    // El maestro puede escribir grades si el parcial NO está cerrado\n    // para el grado del grupo, o si tiene override vigente.\n    function canMaestroWriteGradesFor(partial) {\n      return !isPartialLocked(partial) || teacherHasPartialOverride(partial);\n    }\n\n    function canMaestroWriteGradesForGroup(partial, groupId) {\n      return !isPartialLockedForGrade(\n          partial,\n          get(/databases/$(database)/documents/groups/$(groupId)).data.grado\n        ) || teacherHasPartialOverride(partial);\n    }\n\n    // ─── CONFIGURACION ──────────────────────\n    // Datos de la escuela y school.staff: SOLO admin (Olivia) + secretario_admin (Lupita).\n    // correctionsWindow y captureWindow: admin (Olivia) + subdirector (Octavio).\n    //   Subdirector tiene autoridad academica para abrir/cerrar ventanas igual que admin.\n    match /config/{docId} {\n      allow read: if isAuthenticated();\n      allow write: if (\n        docId == 'correctionsWindow' || docId == 'captureWindow'\n          ? isAdminOrSubdirector()\n          : canManageSchoolConfig()\n      );\n    }\n\n    // ─── USUARIOS ──────────────────────────\n    match /users/{userId} {\n      allow read: if isAuthenticated() && (request.auth.uid == userId || isAdmin());\n      allow write: if isAdmin();\n\n      // C-1 FIX: bootstrap sólo permite crear con role='consulta'.\n      // Admin debe promover manualmente tras verificación.\n      allow create: if isAuthenticated()\n        && request.auth.uid == userId\n        && !exists(/databases/$(database)/documents/users/$(userId))\n        && request.resource.data.role == 'consulta';\n\n      // PRIMER INGRESO: el propio usuario puede actualizar SOLO los campos\n      // de configuración inicial (recoveryEmail, phone, mustChangePassword,\n      // passwordChangedAt, tourCompleted, tourCompletedAt).\n      // Cualquier otro campo (role, teacherId, status) sigue siendo admin-only.\n      // BUGFIX v5.95: agregado 'phone' (registro obligatorio de WhatsApp en\n      // primer ingreso), 'tourCompleted' y 'tourCompletedAt' (onboarding tour).\n      allow update: if isAuthenticated()\n        && request.auth.uid == userId\n        && request.resource.data.diff(resource.data).affectedKeys()\n            .hasOnly(['recoveryEmail', 'phone', 'mustChangePassword', 'passwordChangedAt', 'tourCompleted', 'tourCompletedAt']);\n    }\n\n    // ─── ALIAS DE CORREO PARA LOGIN ────────\n    // Mapeo público recoveryEmail → email sintético @epo67.local.\n    // Permite que los maestros inicien sesión con su correo personal (gmail,\n    // hotmail) en lugar del @epo67.local que no recuerdan. El doc ID es el\n    // correo de recuperación normalizado a minúsculas. Sólo contiene el email\n    // sintético y el uid — no expone datos sensibles.\n    //\n    // Para que un usuario cree su propio alias debe (1) coincidir su uid y\n    // (2) coincidir el doc ID con el recoveryEmail registrado en su user doc.\n    // Esto evita que un atacante registre un alias para el gmail de otro\n    // maestro y le impida loguearse.\n    match /email_aliases/{recoveryEmail} {\n      allow read: if true;\n      allow create: if isAuthenticated() && (\n        isAdmin() ||\n        (\n          request.resource.data.uid == request.auth.uid &&\n          get(/databases/$(database)/documents/users/$(request.auth.uid)).data.recoveryEmail.lower() == recoveryEmail\n        )\n      );\n      allow update: if isAuthenticated() && (\n        isAdmin() ||\n        (\n          resource.data.uid == request.auth.uid &&\n          request.resource.data.uid == request.auth.uid\n        )\n      );\n      allow delete: if isAdmin();\n    }\n\n    // ─── DOCENTES ──────────────────────────\n    match /teachers/{teacherId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo() ||\n        isPresidenteAcademia() || isAuditor() || getTeacherId() == teacherId\n      );\n      // Subdirector puede editar/crear/eliminar docentes (gestión académica)\n      allow write: if isAdminOrSubdirector();\n    }\n\n    // ─── GRUPOS / MATERIAS / ASIGNACIONES ──\n    match /groups/{groupId} {\n      allow read: if isAuthenticated();\n      allow write: if isAdminOrSubdirector();\n    }\n\n    match /subjects/{subjectId} {\n      allow read: if isAuthenticated();\n      allow write: if isAdminOrSubdirector();\n    }\n\n    match /assignments/{assignmentId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo() ||\n        isPresidenteAcademia() || isAuditor() ||\n        resource.data.teacherId == getTeacherId()\n      );\n      allow write: if isAdminOrSubdirector();\n    }\n\n    match /assignmentsByGroup/{docId} {\n      allow read: if isAuthenticated();\n      allow write: if isAdminOrSubdirector();\n    }\n\n    // ─── ALUMNOS ───────────────────────────\n    // Escritura: admin, subdirector y secretario_escolar (jefes de inscripciones)\n    match /students/{studentId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo() ||\n        isPresidenteAcademia() || isAuditor() ||\n        (canMaestro() && teacherHasGroup(resource.data.groupId)) ||\n        // Presidente/Secretario de Academia (con academiaGrado/Turno): puede leer\n        // alumnos de los grupos de su grado+turno aunque no sea su maestro.\n        isAcademiaScopeOf(resource.data.groupId)\n      );\n      allow create, update, delete: if canManageEnrollment();\n    }\n\n    // ─── CALIFICACIONES ────────────────────\n    // C-2 FIX: maestro solo escribe grades si tiene assignment de ese grupo+materia.\n    //\n    // Lectura para Presidente/Secretario de Academia: el rol es ADITIVO — esos\n    // 12 docentes conservan su role base 'maestro' u 'orientador_docente', por lo\n    // que canMaestro() ya les autoriza leer grades. El filtrado al grado+turno\n    // de su academia se hace client-side. Si en el futuro hay un presidente que\n    // NO es maestro, agregar: || isAcademiaScopeOf(resource.data.groupId)\n    match /grades/{gradeId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo() || canMaestro() || isPresidenteAcademia() || isAuditor()\n      );\n\n      allow create: if isAuthenticated() && (\n        isAdminOrSubdirector() ||\n        (canMaestro()\n          && teacherHasAssignment(request.resource.data.groupId, request.resource.data.subjectId)\n          && canMaestroWriteGradesForGroup(request.resource.data.partial, request.resource.data.groupId))\n      );\n\n      allow update: if isAuthenticated() && (\n        isAdminOrSubdirector() ||\n        (canMaestro()\n          && teacherHasAssignment(resource.data.groupId, resource.data.subjectId)\n          && canMaestroWriteGradesForGroup(resource.data.partial, resource.data.groupId))\n      );\n\n      allow delete: if isAdminOrSubdirector();\n    }\n\n    // ─── PARCIALES ─────────────────────────\n    // Subdirector controla apertura/cierre de parciales (jefe academico)\n    match /partials/{partialId} {\n      allow read: if isAuthenticated();\n      allow write: if isAdminOrSubdirector();\n    }\n\n    // ─── EXAMEN EXTRAORDINARIO ─────────────\n    // Captura del extra que reemplaza la cal final de una materia.\n    // docId determinístico: `${studentId}_${subjectId}` (uno por alumno × materia).\n    //\n    // - read: cualquier rol con acceso a calificaciones (mismo set que grades.read).\n    // - write: admin/subdirector/directivo siempre; maestro solo si tiene\n    //   la asignación de ese grupo+materia (teacherHasAssignment).\n    // Esquema (mayo 2026 v7.55 — 3 oportunidades de extraordinario):\n    //   docId = {studentId}_{subjectId}_{oportunidad}  donde oportunidad ∈ {1,2,3}\n    //   data: { studentId, subjectId, groupId, teacherId, oportunidad: 1|2|3,\n    //           calExtraordinario: 5..10, estatus: 'APROBADO'|'REPROBADO',\n    //           fechaAplicacion, fechaCaptura, comentario, ciclo, updatedBy }\n    //\n    // La regla NO valida transición de oportunidades en el servidor (es decir,\n    // no comprueba que para crear _2 ya exista _1 reprobado). Eso lo hace el\n    // frontend. La regla SÍ valida que el campo `oportunidad` sea 1/2/3 y la\n    // cal esté en rango 5..10.\n    match /extraordinarios/{docId} {\n      // READ: amplio para que todos los roles educativos puedan consultar\n      // (boletas, reportes, vistas read-only). Solo el WRITE es estricto.\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo() || canMaestro() || isPresidenteAcademia() || isAuditor()\n      );\n      // WRITE (create/update) — REGLA EPO 67 v8.02 IMPERATIVA:\n      // Solo pueden CAPTURAR extraordinarios:\n      //   1) Admin (Olivia) — override administrativo\n      //   2) Subdirector (Octavio) — aplicador formal\n      //   3) El maestro CUYO teacherId coincide con la asignación + tiene\n      //      el assignment doc en /assignments. Incluye orientador_docente,\n      //      presidente_academia con asignación real, e interim (porque la\n      //      asignación interim también tiene su teacherId).\n      // NADIE más captura: orientador puro, auditor, directivo, secretarios,\n      // consulta — todos read-only por más que el frontend les exponga\n      // inputs por bug.\n      //\n      // Dos escenarios válidos de captura:\n      //   A) Cal numérica 5-10 con estatus APROBADO/REPROBADO\n      //   B) NP (no presentó): sin cal numérica, estatus='NO_PRESENTO'.\n      //      Cuenta como \"no acreditó\" y manda al alumno a la siguiente oportunidad.\n      //      Si la 3ª oportunidad termina en NO_PRESENTO → baja pendiente.\n      allow create, update: if isAuthenticated() && (\n        (\n          // Caso A — cal numérica\n          (request.resource.data.calExtraordinario is number\n            && request.resource.data.calExtraordinario >= 5\n            && request.resource.data.calExtraordinario <= 10)\n          ||\n          // Caso B — NO PRESENTÓ\n          (request.resource.data.estatus == 'NO_PRESENTO')\n        )\n        && (\n          !('oportunidad' in request.resource.data) ||\n          request.resource.data.oportunidad in [1, 2, 3]\n        )\n        && (\n          // Lista blanca estricta — solo estos 3 caminos permiten escribir.\n          isAdmin()\n          || isSubdirector()\n          || (\n              canMaestro()\n              && teacherHasAssignment(request.resource.data.groupId, request.resource.data.subjectId)\n              && request.resource.data.teacherId == getTeacherId()\n            )\n        )\n      );\n      allow delete: if isAdminOrSubdirector();\n    }\n\n    // ─── AT RISK ───────────────────────────\n    match /atRisk/{docId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo() || isAuditor() ||\n        (canMaestro() && resource.data.teacherId == getTeacherId())\n      );\n      allow create: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() ||\n        (canMaestro() && request.resource.data.teacherId == getTeacherId())\n      );\n      allow update: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() ||\n        (canMaestro() && resource.data.teacherId == getTeacherId())\n      );\n      allow delete: if isAdminOrSubdirector();\n    }\n\n    // ─── ACTIVITY LOG ──────────────────────\n    // M-2 FIX: forzar userId == auth.uid para no suplantar\n    match /activityLog/{logId} {\n      allow read: if isAdmin() || isSubdirector() || canReadAsDirectivo();\n      allow create: if isAuthenticated()\n        && request.resource.data.userId == request.auth.uid;\n      allow update, delete: if false;\n    }\n\n    // ─── EMAIL ALERTS ──────────────────────\n    // A-3 FIX: solo roles de gestión pueden encolar emails\n    match /emailAlerts/{alertId} {\n      allow read: if isAdmin() || isSubdirector();\n      allow create: if isAuthenticated() && (isAdmin() || isSubdirector() || canOrientador() || isDirectivo());\n      allow update: if isAdminOrSubdirector();\n      allow delete: if false;\n    }\n\n    // ─── INSCRIPCIONES ─────────────────────\n    // Escritura: admin, subdirector y secretario_escolar\n    match /enrollments/{enrollmentId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canOrientador() || canReadAsDirectivo()\n      );\n      allow write: if canManageEnrollment();\n    }\n\n    match /partialOverrides/{overrideId} {\n      allow read: if isAuthenticated();\n      allow write: if isAdminOrSubdirector();\n    }\n\n    // ─── CERTIFIED SNAPSHOTS — INMUTABLES ─────────────────────────\n    // Snapshots criptográficamente firmados (SHA256) del estado de los\n    // grades en un momento dado. Son EVIDENCIA INMUTABLE para auditoría\n    // y entrega de boletas oficiales.\n    //\n    // Regla v8.06: NADIE puede modificar o borrar un snapshot una vez creado.\n    // Solo admin/subdirector pueden CREAR snapshots nuevos.\n    // Lectura abierta a todos los autenticados (transparencia).\n    match /certifiedSnapshots/{snapshotId} {\n      allow read: if isAuthenticated();\n      allow create: if isAdminOrSubdirector();\n      allow update: if false;  // ← INMUTABLE\n      allow delete: if false;  // ← INMUTABLE\n    }\n\n    // ─── ASISTENCIA ────────────────────────\n    // A-1 FIX: maestro sólo puede registrar de su grupo\n    match /attendance/{attendanceId} {\n      allow read: if isAuthenticated();\n      allow create: if isAuthenticated() && (\n        isAdminOrSubdirector() ||\n        (canMaestro() && teacherHasGroup(request.resource.data.groupId))\n      );\n      allow update: if isAuthenticated() && (\n        isAdminOrSubdirector() ||\n        (canMaestro() && teacherHasGroup(resource.data.groupId))\n      );\n      allow delete: if isAdminOrSubdirector();\n    }\n\n    // ─── INCIDENCIAS ───────────────────────\n    match /incidents/{incidentId} {\n      allow read: if isAuthenticated();\n      allow create: if isAuthenticated() && (isAdmin() || isSubdirector() || canOrientador() || canMaestro());\n      allow update: if isAuthenticated() && (isAdmin() || isSubdirector() || canOrientador());\n      allow delete: if isAuthenticated() && (isAdmin() || isSubdirector() || canOrientador());\n    }\n\n    // ─── HORAS DE MAESTRO ──────────────────\n    match /teacherHours/{docId} {\n      allow read: if isAuthenticated();\n      // Las horas impartidas son SEMESTRALES: una sola captura visible en P1/P2/P3.\n      // Por eso NO se bloquean por parcial cerrado. El cierre aplica a grades,\n      // no a teacherHours. Para maestros, basta que tengan la asignación real\n      // del grupo+materia; así el cliente viejo puede guardar horas P1/P2/P3\n      // sin permitir modificar calificaciones de P1/P2.\n      allow create: if isAuthenticated() && (\n        isAdminOrSubdirector() ||\n        (canMaestro() && teacherHasAssignment(request.resource.data.groupId, request.resource.data.subjectId))\n      );\n      allow update: if isAuthenticated() && (\n        isAdminOrSubdirector() ||\n        (canMaestro() && teacherHasAssignment(request.resource.data.groupId, request.resource.data.subjectId))\n      );\n      allow delete: if isAdminOrSubdirector();\n    }\n\n    // ─── CORRECCIONES DE CALIFICACIONES ────\n    // FLUJO v5.59:\n    //   - Maestros crean solicitudes con status='pending' (sobre sus alumnos)\n    //   - Admin/Subdirector/Directivo (read), aprueban/aplican\n    //   - La aplicacion real se valida via /config/correctionsWindow (manual)\n    match /gradeCorrections/{correctionId} {\n      allow read: if isAuthenticated() && (\n        isAdmin() || isSubdirector() || canReadAsDirectivo() ||\n        // El maestro lee SUS propias solicitudes\n        (canMaestro() && resource.data.requestedBy == request.auth.uid)\n      );\n\n      // CREATE: admin/subdirector/directivo siempre, maestro solo de sus alumnos.\n      //\n      // Flujos posibles:\n      //   1. SOLICITUD (maestro o admin/dirección): status='pending'.\n      //      Cal nueva >= cal actual (no se rescatan reprobados por debajo).\n      //   2. APLICACIÓN DIRECTA (solo admin/subdirector): status='applied'.\n      //      Pueden subir, bajar o capturar primera vez (autoridad académica\n      //      equivalente a corrección manual del registro de calificaciones).\n      //      Se ejecuta junto con el update a /grades/{gradeId}.\n      //\n      // Campos mínimos comunes: studentId, subjectId, partial, newGrade, reason, folio, status.\n      allow create: if isAuthenticated()\n        && request.resource.data.keys().hasAll(['studentId', 'subjectId', 'partial', 'newGrade', 'reason', 'folio', 'status'])\n        && request.resource.data.newGrade is number\n        && request.resource.data.newGrade >= 5\n        && request.resource.data.newGrade <= 10\n        && (\n          // FLUJO 1 (solicitud de maestro): cualquier rol autorizado, status='pending',\n          //   y si hay currentGrade numero la nueva debe ser >=.\n          //\n          // v8.07: además exige:\n          //   - El parcial debe estar CERRADO para el grado del alumno (no se\n          //     puede solicitar correcciones de un parcial que el maestro aún\n          //     puede editar directo).\n          //   - La ventana de correcciones debe estar ABIERTA (config/correctionsWindow).\n          // Admin/subdirector/directivo SE SALTAN estas validaciones (autoridad).\n          (\n            request.resource.data.status == 'pending'\n            && (\n              !('currentGrade' in request.resource.data) ||\n              request.resource.data.currentGrade == null ||\n              !(request.resource.data.currentGrade is number) ||\n              request.resource.data.newGrade >= request.resource.data.currentGrade\n            )\n            && (\n              isAdmin() || isSubdirector() || isDirectivo() ||\n              (canMaestro()\n                && request.resource.data.requestedBy == request.auth.uid\n                && teacherHasAssignment(request.resource.data.groupId, request.resource.data.subjectId)\n                // v8.07 — bloqueos adicionales para maestros:\n                && 'grado' in request.resource.data\n                && isPartialLockedForGrade(request.resource.data.partial, request.resource.data.grado)\n                && isCorrectionsWindowOpen())\n            )\n          ) ||\n          // FLUJO 2 (aplicación directa): solo admin/subdirector,\n          //   status='applied', cualquier dirección de cambio (5-10).\n          (\n            request.resource.data.status == 'applied'\n            && isAdminOrSubdirector()\n          ) ||\n          // FLUJO 3 (REPLICACIÓN AUTORIZADA por Dirección): orientador SOLICITA\n          //   con source='replication_request', status='pending'. Aquí newGrade\n          //   PUEDE ser menor que currentGrade (no aplica regla \"no bajar\")\n          //   porque hay oficio de Dirección que lo autoriza. La aplicación\n          //   final la hace admin/subdirector con el doble check.\n          (\n            request.resource.data.status == 'pending'\n            && request.resource.data.source == 'replication_request'\n            && request.resource.data.requestedBy == request.auth.uid\n            && request.resource.data.authOficio is string\n            && request.resource.data.authOficio.size() > 0\n            && (canOrientador() || isAdmin() || isSubdirector() || isDirectivo())\n          )\n        );\n\n      // UPDATE:\n      //   - El maestro autor puede ANULAR su propia solicitud mientras este 'pending'\n      //     (cambia status a 'cancelled'). No puede modificar otros campos.\n      //   - Admin/Subdirector pueden cambiar status a received/authorized/applied/rejected.\n      allow update: if isAuthenticated() && (\n        isAdmin() || isSubdirector() ||\n        (\n          // Maestro autor anula su propia solicitud mientras este pending.\n          canMaestro()\n          && resource.data.requestedBy == request.auth.uid\n          && resource.data.status == 'pending'\n          && request.resource.data.status == 'cancelled'\n          // Solo se permite cambiar status, cancelledAt y cancelledBy (afectados)\n          && request.resource.data.diff(resource.data).affectedKeys()\n              .hasOnly(['status', 'cancelledAt', 'cancelledBy'])\n        )\n      );\n\n      // DELETE: admin + subdirector (auditoria - no se borran solicitudes normales)\n      allow delete: if isAdminOrSubdirector();\n    }\n\n    // ─── NOTIFICACIONES ────────────────────\n    match /notifications/{notifId} {\n      allow read: if isAuthenticated() && (isAdmin() || isSubdirector() || canReadAsDirectivo());\n      allow create: if isAuthenticated() && (isAdmin() || isSubdirector() || isDirectivo());\n    }\n  }\n}\n";
let deviceCode=null, token=null, interval=5;
const logEl=document.getElementById('log');
const log=m=>{logEl.textContent+='\n'+m;logEl.scrollTop=logEl.scrollHeight;};
async function postForm(url, params){
 const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(params)});
 const data=await res.json().catch(()=>null);
 if(!res.ok) throw new Error(res.status+' '+res.statusText+': '+JSON.stringify(data));
 return data;
}
async function api(url, options){
 const res=await fetch(url,{...options,headers:{Authorization:'Bearer '+token,'Content-Type':'application/json',...(options.headers||{})}});
 const text=await res.text(); let data; try{data=JSON.parse(text)}catch(_){data=text}
 if(!res.ok) throw new Error(res.status+' '+res.statusText+': '+(typeof data==='string'?data:JSON.stringify(data)));
 return data;
}
document.getElementById('device').onclick=async()=>{
 logEl.textContent='Pidiendo código a Google...';
 try{
  const data=await postForm('https://oauth2.googleapis.com/device/code',{client_id:CLIENT_ID,scope:'https://www.googleapis.com/auth/firebase https://www.googleapis.com/auth/cloud-platform'});
  deviceCode=data.device_code; interval=data.interval||5;
  document.getElementById('poll').disabled=false;
  log('Abre esta URL en otra pestaña: '+data.verification_url);
  log('Código: '+data.user_code);
  log('Después de autorizar con epoem67@gmail.com, vuelve aquí y presiona el botón 2.');
  const p=document.createElement('p'); p.innerHTML='Código: <code>'+data.user_code+'</code><br><a href="'+data.verification_url+'" target="_blank">Abrir página de autorización</a>'; document.body.insertBefore(p,logEl);
 }catch(e){log('ERROR DEVICE: '+(e.message||e));}
};
document.getElementById('poll').onclick=async()=>{
 try{
  log('Consultando token...');
  const data=await postForm('https://oauth2.googleapis.com/token',{client_id:CLIENT_ID,device_code:deviceCode,grant_type:'urn:ietf:params:oauth:grant-type:device_code'});
  token=data.access_token;
  document.getElementById('deploy').disabled=false;
  log('Token obtenido. Ya puedes publicar reglas.');
 }catch(e){log('ERROR TOKEN: '+(e.message||e));}
};
document.getElementById('deploy').onclick=async()=>{
 try{
  log('Creando ruleset...');
  const ruleset=await api('https://firebaserules.googleapis.com/v1/projects/'+PROJECT+'/rulesets',{method:'POST',body:JSON.stringify({source:{files:[{name:'firestore.rules',content:RULES}]}})});
  log('Ruleset creado: '+ruleset.name);
  log('Actualizando release cloud.firestore...');
  const release=await api('https://firebaserules.googleapis.com/v1/projects/'+PROJECT+'/releases/cloud.firestore?updateMask=rulesetName',{method:'PATCH',body:JSON.stringify({name:'projects/'+PROJECT+'/releases/cloud.firestore',rulesetName:ruleset.name})});
  log('PUBLICADO: '+release.name+' -> '+release.rulesetName);
  log('Listo. Las reglas activas ya permiten horas semestrales sin abrir P1/P2.');
 }catch(e){log('ERROR PUBLICANDO: '+(e.message||e));}
};
</script></body></html>
